<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MEmu Monitor</title>
<script src="https://telegram.org/js/telegram-web-app.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #0f1117; color: #e2e8f0; min-height: 100vh; }
.header { background: #1a1d2e; border-bottom: 1px solid #2d3148; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; position: sticky; top: 0; z-index: 10; }
.header-left { display: flex; align-items: center; gap: 10px; }
.logo { width: 32px; height: 32px; background: linear-gradient(135deg, #4f8ef7, #7c3aed); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 16px; }
.title { font-size: 15px; font-weight: 600; color: #f1f5f9; }
.subtitle { font-size: 11px; color: #64748b; }
.dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; display: inline-block; margin-right: 4px; animation: pulse 2s infinite; }
.dot.offline { background: #ef4444; animation: none; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }
.refresh-btn { background: #2d3148; border: 1px solid #3d4268; color: #94a3b8; border-radius: 8px; padding: 6px 12px; font-size: 12px; cursor: pointer; display: flex; align-items: center; gap: 4px; }
.refresh-btn:active { opacity: 0.7; }
.summary { display: grid; grid-template-columns: repeat(2, 1fr); gap: 8px; padding: 12px 16px; }
.metric { background: #1a1d2e; border: 1px solid #2d3148; border-radius: 12px; padding: 12px; }
.metric-label { font-size: 11px; color: #64748b; margin-bottom: 4px; text-transform: uppercase; letter-spacing: 0.5px; }
.metric-value { font-size: 24px; font-weight: 700; color: #f1f5f9; }
.metric-sub { font-size: 11px; color: #475569; margin-top: 2px; }
.section-title { font-size: 12px; font-weight: 600; color: #64748b; text-transform: uppercase; letter-spacing: 0.5px; padding: 0 16px 8px; }
.pc-list { padding: 0 16px 16px; display: flex; flex-direction: column; gap: 10px; }
.pc-card { background: #1a1d2e; border: 1px solid #2d3148; border-radius: 14px; overflow: hidden; }
.pc-card-header { padding: 12px 14px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #2d3148; }
.pc-name { font-size: 14px; font-weight: 600; color: #f1f5f9; display: flex; align-items: center; gap: 8px; }
.badge { font-size: 10px; padding: 3px 8px; border-radius: 20px; font-weight: 600; }
.badge-online { background: #14532d; color: #4ade80; }
.badge-offline { background: #450a0a; color: #f87171; }
.pc-time { font-size: 11px; color: #475569; }
.pc-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: #2d3148; }
.stat { background: #1a1d2e; padding: 10px 12px; }
.stat-label { font-size: 10px; color: #475569; margin-bottom: 3px; text-transform: uppercase; }
.stat-val { font-size: 14px; font-weight: 600; color: #e2e8f0; }
.stat-val.warn { color: #f59e0b; }
.stat-val.danger { color: #ef4444; }
.bar-wrap { height: 3px; background: #2d3148; border-radius: 2px; margin-top: 4px; }
.bar { height: 3px; border-radius: 2px; transition: width 0.5s; }
.bar-ok { background: #22c55e; }
.bar-warn { background: #f59e0b; }
.bar-danger { background: #ef4444; }
.pc-footer { padding: 8px 14px; display: flex; gap: 6px; border-top: 1px solid #2d3148; }
.pc-footer span { font-size: 11px; color: #475569; }
.pc-footer strong { color: #94a3b8; }
.loading { text-align: center; padding: 40px; color: #475569; }
.spinner { width: 24px; height: 24px; border: 2px solid #2d3148; border-top-color: #4f8ef7; border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 12px; }
@keyframes spin { to { transform: rotate(360deg); } }
.no-data { background: #1a1d2e; border: 1px solid #2d3148; border-radius: 12px; padding: 20px; text-align: center; color: #475569; font-size: 13px; }
.last-update { text-align: center; font-size: 11px; color: #334155; padding: 8px; }
</style>
</head>
<body>

<div class="header">
  <div class="header-left">
    <div class="logo">🖥</div>
    <div>
      <div class="title"><span class="dot" id="conn-dot"></span>MEmu Monitor</div>
      <div class="subtitle" id="last-update">Cargando...</div>
    </div>
  </div>
  <button class="refresh-btn" onclick="loadData()">↻ Actualizar</button>
</div>

<div class="summary" id="summary">
  <div class="metric"><div class="metric-label">PCs en línea</div><div class="metric-value" id="s-online">—</div><div class="metric-sub">de <span id="s-total">—</span> total</div></div>
  <div class="metric"><div class="metric-label">MEmu activo</div><div class="metric-value" id="s-memu">—</div><div class="metric-sub">instancias totales</div></div>
  <div class="metric"><div class="metric-label">CPU promedio</div><div class="metric-value" id="s-cpu">—</div><div class="metric-sub">todas las PCs</div></div>
  <div class="metric"><div class="metric-label">RAM promedio</div><div class="metric-value" id="s-ram">—</div><div class="metric-sub">todas las PCs</div></div>
</div>

<div class="section-title">PCs</div>
<div class="pc-list" id="pc-list">
  <div class="loading"><div class="spinner"></div>Conectando con Telegram...</div>
</div>
<div class="last-update" id="footer-time"></div>

<script>
const TOKEN = '8832829948:AAHzMPZUE-WLqm6Qt8uLSWGoSLvbRW1ZfQg';
const GROUP_ID = '-1003543103535';

if (window.Telegram && window.Telegram.WebApp) {
  window.Telegram.WebApp.expand();
  window.Telegram.WebApp.setHeaderColor('#1a1d2e');
}

let pcData = {};

function barColor(pct) {
  if (pct >= 90) return 'bar-danger';
  if (pct >= 75) return 'bar-warn';
  return 'bar-ok';
}

function valColor(pct) {
  if (pct >= 90) return 'danger';
  if (pct >= 75) return 'warn';
  return '';
}

function renderPC(name, data) {
  const now = Math.floor(Date.now() / 1000);
  const isOnline = data && (now - data.ts) < 120;
  const badge = isOnline
    ? '<span class="badge badge-online">● En línea</span>'
    : '<span class="badge badge-offline">● Sin datos</span>';

  if (!isOnline) {
    return `<div class="pc-card">
      <div class="pc-card-header">
        <div class="pc-name">🖥 ${name} ${badge}</div>
        <span class="pc-time">Sin datos recientes</span>
      </div>
      <div class="no-data" style="border-radius:0;border:none;">Sin respuesta en los últimos 2 min</div>
    </div>`;
  }

  const d = data;
  return `<div class="pc-card">
    <div class="pc-card-header">
      <div class="pc-name">🖥 ${d.pc || name} ${badge}</div>
      <span class="pc-time">${d.time || ''}</span>
    </div>
    <div class="pc-stats">
      <div class="stat">
        <div class="stat-label">CPU</div>
        <div class="stat-val ${valColor(d.cpu)}">${d.cpu}%</div>
        <div class="bar-wrap"><div class="bar ${barColor(d.cpu)}" style="width:${Math.min(d.cpu,100)}%"></div></div>
      </div>
      <div class="stat">
        <div class="stat-label">RAM</div>
        <div class="stat-val ${valColor(d.ramPct)}">${d.ramPct}%</div>
        <div class="bar-wrap"><div class="bar ${barColor(d.ramPct)}" style="width:${Math.min(d.ramPct,100)}%"></div></div>
      </div>
      <div class="stat">
        <div class="stat-label">Disco</div>
        <div class="stat-val">${d.diskFree}GB</div>
        <div class="bar-wrap"><div class="bar bar-ok" style="width:${Math.min((d.diskFree/d.diskTotal)*100,100)}%"></div></div>
      </div>
      <div class="stat">
        <div class="stat-label">MEmu</div>
        <div class="stat-val">${d.memu} inst</div>
      </div>
      <div class="stat">
        <div class="stat-label">Uptime</div>
        <div class="stat-val" style="font-size:11px">${d.uptime}</div>
      </div>
      <div class="stat">
        <div class="stat-label">IP</div>
        <div class="stat-val" style="font-size:11px">${d.ip}</div>
      </div>
    </div>
    <div class="pc-footer">
      <span>RAM: <strong>${d.ramUsed}/${d.ramTotal} GB</strong></span>
      <span>•</span>
      <span>Disco libre: <strong>${d.diskFree}/${d.diskTotal} GB</strong></span>
    </div>
  </div>`;
}

function updateSummary() {
  const now = Math.floor(Date.now() / 1000);
  const online = Object.values(pcData).filter(d => d && (now - d.ts) < 120);
  document.getElementById('s-online').textContent = online.length;
  document.getElementById('s-total').textContent = Object.keys(pcData).length;
  document.getElementById('s-memu').textContent = online.reduce((a, d) => a + (d.memu || 0), 0);
  document.getElementById('s-cpu').textContent = online.length
    ? Math.round(online.reduce((a, d) => a + (d.cpu || 0), 0) / online.length) + '%' : '—';
  document.getElementById('s-ram').textContent = online.length
    ? Math.round(online.reduce((a, d) => a + (d.ramPct || 0), 0) / online.length) + '%' : '—';
}

async function loadData() {
  const dot = document.getElementById('conn-dot');
  dot.className = 'dot offline';
  try {
    const res = await fetch(`https://api.telegram.org/bot${TOKEN}/getUpdates?limit=100`);
    const json = await res.json();
    if (!json.ok) throw new Error('API error');

    const seen = {};
    for (const upd of (json.result || [])) {
      const msg = upd.channel_post || upd.message;
      const text = msg && msg.text;
      if (!text || !text.startsWith('PCDATA:')) continue;
      try {
        const raw = decodeURIComponent(text.replace('PCDATA:', ''));
        const d = JSON.parse(raw);
        const key = d.pc || 'PC';
        if (!seen[key] || upd.update_id > seen[key].uid) {
          seen[key] = { uid: upd.update_id, data: d, ts: msg.date };
        }
      } catch(e) {}
    }

    pcData = {};
    for (const [key, val] of Object.entries(seen)) {
      pcData[key] = { ...val.data, ts: val.ts };
    }

    dot.className = 'dot';
    const now = new Date().toLocaleTimeString('es', { hour: '2-digit', minute: '2-digit', second: '2-digit' });
    document.getElementById('last-update').textContent = 'Actualizado ' + now;
    document.getElementById('footer-time').textContent = 'Última actualización: ' + now;

    const list = document.getElementById('pc-list');
    if (Object.keys(pcData).length === 0) {
      list.innerHTML = '<div class="no-data">No se recibieron datos todavía.<br>Asegúrate de que los scripts estén corriendo.</div>';
    } else {
      list.innerHTML = Object.keys(pcData).map(name => renderPC(name, pcData[name])).join('');
    }
    updateSummary();
  } catch(e) {
    dot.className = 'dot offline';
    document.getElementById('last-update').textContent = 'Error de conexión';
  }
}

loadData();
setInterval(loadData, 30000);
</script>
</body>
</html>
